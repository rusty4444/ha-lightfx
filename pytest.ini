[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q --strict-markers --strict-config
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*async_generator.*:DeprecationWarning
    ignore:.*coroutine.*:DeprecationWarning
    ignore:.*asyncio.*:DeprecationWarning
    ignore:.*Home Assistant.*:DeprecationWarning

markers =
    unit: Unit tests (fast, no Home Assistant)
    integration: Integration tests (require Home Assistant)
    config_flow: Config flow tests